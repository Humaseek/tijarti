<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>بدون اتصال — Tijarti</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, sans-serif;
      background: #FAF7F0;
      color: #1C1B1A;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 360px;
      padding: 28px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 16px;
      background: #0F6E56;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 28px;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 14px; color: #6b6660; line-height: 1.6; margin: 0 0 16px; }
    button {
      background: #0F6E56;
      color: #fff;
      border: 0;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📴</div>
    <h1>أنتِ غير متصلة بالإنترنت</h1>
    <p>بياناتك محفوظة محلياً — لما يرجع الاتصال كل شي بيعمل مزامنة.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
